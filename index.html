<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sun Set Padel Vienna - Padel Community, Events & Tournaments</title>
    <meta
      name="description"
      content="Join Vienna's premier padel community. Weekly games, corporate tournaments, memberships and merch. Play padel at Padeldome Erdberg and DonauCity."
    />
    <meta name="author" content="Sun Set Padel Vienna" />

    <!-- Canonical -->
    <link rel="canonical" href="https://sunsetpadel.at/" />

    <!-- Open Graph (WhatsApp / Facebook / Messenger / LinkedIn) -->
    <meta property="og:site_name" content="Sun Set Padel Vienna" />
    <meta property="og:title" content="Sun Set Padel Vienna - Padel Community, Events & Tournaments" />
    <meta
      property="og:description"
      content="Weekly games, tournaments, corporate events and memberships. Join the community and play padel in Vienna."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sunsetpadel.at/" />

    <!-- IMPORTANT: Add a real image at /public/og-image.png (recommended 1200x630) -->
    <meta property="og:image" content="https://sunsetpadel.at/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Sun Set Padel Vienna" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sun Set Padel Vienna - Padel Community, Events & Tournaments" />
    <meta
      name="twitter:description"
      content="Weekly games, tournaments, corporate events and memberships. Join the community and play padel in Vienna."
    />
    <meta name="twitter:image" content="https://sunsetpadel.at/og-image.png" />

    <!-- Optional: if you have an X/Twitter handle -->
    <!-- <meta name="twitter:site" content="@sunset_padel_vienna" /> -->
  </head>
